<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archivio — Libri & Stampe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="logo">ARCHIVIO</div>

    <nav>
      <a href="#shop">Shop</a>
      <a href="#featured">Collezioni</a>
      <a href="#about">Info</a>
      <a href="#contact">Contatti</a>
    </nav>
  </header>

  <main>

    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">LIBRI · STAMPE · EDIZIONI</p>
        <h1>
          Oggetti editoriali
          per spazi contemporanei.
        </h1>
      </div>

      <div class="hero-grid">
        <div class="hero-card large">
          <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=1200&auto=format&fit=crop" alt="Libri" />
        </div>

        <div class="hero-card">
          <img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=1200&auto=format&fit=crop" alt="Stampe artistiche" />
        </div>

        <div class="hero-card text-card">
          <span>Curated editions.</span>
        </div>
      </div>
    </section>


    <section class="section-head" id="featured">
      <p>FEATURED COLLECTIONS</p>
    </section>


    <section class="product-grid" id="shop">

      <article class="product-card large">
        <img src="https://images.unsplash.com/photo-1521587760476-6c12a4b040da?q=80&w=1200&auto=format&fit=crop" alt="Libro editoriale" />

        <div class="product-info">
          <div>
            <h2>Atlas No.01</h2>
            <p>Fotografia contemporanea</p>
          </div>

          <span>€48</span>
        </div>
      </article>


      <article class="product-card">
        <img src="https://images.unsplash.com/photo-1495446815901-a7297e633e8d?q=80&w=1200&auto=format&fit=crop" alt="Libro" />

        <div class="product-info">
</html>
