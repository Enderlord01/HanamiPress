<html lang="it">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <a href="index.html" class="site-logo">Hanami Press</a>
    <nav class="site-nav">
      <a href="#">Catalogo</a>

    <a href="#">Catalogo</a>
    <a href="#">Zine</a>
    <a href="#">Stampe</a>

    <a href="#">Autori</a>
    <a href="contatti.html">Contatti</a>
  </nav>

  <!-- PAGE HEADER -->
  <div class="products-header">
    <span>Eventi</span>
  </div>

<!-- MAPPA -->
<div class="products-header">
  <span>I nostri mercatini</span>
</div>

<section class="map-section">
  <div id="map"></div>
</section>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map', {
    center: [42.5, 12.5],
    zoom: 6,
    zoomControl: true,
    scrollWheelZoom: false
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  const markerStyle = {
    radius: 8,
    fillColor: '#ff00ff',
    color: '#ff00ff',
    weight: 1,
    opacity: 1,
    fillOpacity: 1
  };

  const mercatini = [
    { coords: [44.4949, 11.3426], nome: 'Nome Mercatino', citta: 'Bologna', data: 'GG/MM/AAAA' },
    { coords: [43.9098, 12.9131], nome: 'Nome Mercatino', citta: 'Pesaro', data: 'GG/MM/AAAA' },
    { coords: [43.8380, 13.0186], nome: 'Nome Mercatino', citta: 'Fano', data: 'GG/MM/AAAA' },
    { coords: [41.9028, 12.4964], nome: 'Nome Mercatino', citta: 'Roma', data: 'GG/MM/AAAA' },
    { coords: [44.2719, 12.3414], nome: 'Nome Mercatino', citta: 'Lido di Savio', data: 'GG/MM/AAAA' },
    { coords: [43.9885, 12.6957], nome: 'Nome Mercatino', citta: 'Misano Adriatico', data: 'GG/MM/AAAA' },
    { coords: [43.6158, 13.5189], nome: 'Nome Mercatino', citta: 'Ancona', data: 'GG/MM/AAAA' }
  ];

  mercatini.forEach(m => {
    L.circleMarker(m.coords, markerStyle)
      .addTo(map)
      .bindPopup(`
        <strong>${m.nome}</strong><br>
        ${m.citta}<br>
        <span style="opacity:0.6">${m.data}</span>
      `);
  });
</script>

  <!-- WORDMARK -->
  <section class="wordmark-section">
    <span class="wordmark-text">Hanami Press</span>
  </section>

  <!-- FOOTER -->
  <footer class="site-footer">
    <span class="footer-copy">Hanami Press, 2026</span>
    <a href="https://www.instagram.com/hanamipress" target="_blank" rel="noopener" class="footer-instagram" aria-label="Instagram">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
      </svg>
    </a>
  </footer>

</body>
</html>
