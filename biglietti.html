<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Biglietto da visita rotante</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f0f0f0;
      margin: 0;
    }

    .card-container {
      perspective: 1000px;
    }

    .card {
      width: 350px;
      height: 200px;
      position: relative;
      transform-style: preserve-3d;
      animation: rotateCard 6s infinite linear;
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .front {
      background: url('fronte.jpg') center/cover no-repeat;
    }

    .back {
      background: url('retro.jpg') center/cover no-repeat;
      transform: rotateY(180deg);
    }

    @keyframes rotateCard {
      0% {
        transform: rotateY(0deg);
      }
      100% {
        transform: rotateY(360deg);
      }
    }
  </style>
</head>
<body>

<div class="card-container">
  <div class="card">
    <div class="card-face front"></div>
    <div class="card-face back"></div>
  </div>
</div>

</body>
</html
